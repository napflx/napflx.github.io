<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Cinema - Minimal Player</title>
  <style>
    :root {
      --bg-color: #0f1117;
      --card-bg: #1a1d24;
      --accent-color: #6366f1;
      --text-main: #f3f4f6;
      --border-color: #2e333d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.2s ease;
    }

    .back-btn:hover {
      opacity: 0.8;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .logo span {
      color: var(--accent-color);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .video-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border-color);
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <header>
    <h1 style="text-align: center;">☁️ Napflix ☁️</h1>
  </header>

  <main>
    <div class="video-container">
      <iframe id="single-player" src="" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
    </div>
  </main>

  <footer>
    <a href="index.html" class="back-btn">&larr; Back</a>
  </footer>

  <script>
    // Paste either:
    // 1. Direct embed link: "https://archive.org/embed/cloning-the-woolly-mammoth-2016"
    // 2. Raw iframe tag: '<iframe src="https://archive.org/embed/..." ...></iframe>'
    const videoEmbed = "https://archive.org/embed/yes-minister-1980-1984";

    function parseEmbedUrl(input) {
      if (input.includes('<iframe')) {
        const match = input.match(/src=["']([^"']+)["']/);
        return match ? match[1] : '';
      }
      return input.trim();
    }

    document.getElementById('single-player').src = parseEmbedUrl(videoEmbed);
  </script>
</body>
</html>
